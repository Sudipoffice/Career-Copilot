[build]
  command = "pnpm install && pnpm --filter @career-copilot/web build && cp -r apps/frontend/public/. apps/frontend/.next/"
  publish = "apps/frontend/.next"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
